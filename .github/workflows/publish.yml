name: Publish to NPM

# This workflow handles all publishing to npm for releases and nightly
# pre-release builds. We use a single workflow file because npm Trusted
# Publishing currently supports only a single workflow file.

on:
    release:
        types: [published]
    schedule:
        - cron: '0 3 * * *' # Nightly at 03:00 UTC
    workflow_dispatch:
        inputs:
            publish_type:
                description: 'Type of publish'
                required: true
                type: choice
                options:
                    - release
                    - nightly
            package:
                description: 'Package to publish (nightly only, leave "all" for release)'
                required: false
                type: choice
                options:
                    - all
                    - braintree-plugin
                    - elasticsearch-plugin
                    - mollie-plugin
                    - sentry-plugin
                    - stellate-plugin
                    - stripe-plugin
                    - pub-sub-plugin
                default: 'all'
            dry-run:
                description: 'Dry run (no actual publish)'
                required: false
                type: boolean
                default: false

jobs:
    setup:
        runs-on: ubuntu-latest
        outputs:
            publish_type: ${{ steps.determine.outputs.publish_type }}
        steps:
            - name: Determine publish type
              id: determine
              run: |
                  if [ "${{ github.event_name }}" == "release" ]; then
                    echo "publish_type=release" >> $GITHUB_OUTPUT
                  elif [ "${{ github.event_name }}" == "schedule" ]; then
                    echo "publish_type=nightly" >> $GITHUB_OUTPUT
                  else
                    echo "publish_type=${{ inputs.publish_type }}" >> $GITHUB_OUTPUT
                  fi

    publish:
        needs: setup
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # For nightly builds: check if there were commits in the last 24 hours
            - name: Check for new commits
              id: commit_check
              if: needs.setup.outputs.publish_type == 'nightly'
              run: |
                  COMMITS=$(git rev-list --count --since="24 hours" HEAD)
                  echo "Commits found in last 24h: $COMMITS"
                  if [ "$COMMITS" -eq 0 ]; then
                    echo "should_publish=false" >> $GITHUB_OUTPUT
                  else
                    echo "should_publish=true" >> $GITHUB_OUTPUT
                  fi

            - name: Skip publish (no new commits)
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'false'
              run: echo "No new commits in last 24 hours – skipping nightly publish."

            - name: Setup Node.js
              if: needs.setup.outputs.publish_type == 'release' || steps.commit_check.outputs.should_publish == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '24.x'
                  registry-url: 'https://registry.npmjs.org'

            - name: Update npm
              if: needs.setup.outputs.publish_type == 'release' || steps.commit_check.outputs.should_publish == 'true'
              run: npm install -g npm@latest

            - name: Install dependencies
              if: needs.setup.outputs.publish_type == 'release' || steps.commit_check.outputs.should_publish == 'true'
              run: npm install --no-save

            - name: Build
              if: needs.setup.outputs.publish_type == 'release' || steps.commit_check.outputs.should_publish == 'true'
              run: npm run build

            # Nightly builds: configure git and bump to pre-release versions
            - name: Configure Git
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'true'
              run: |
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "github-actions[bot]"

            - name: Get current date
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'true'
              id: date
              run: echo "date=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

            - name: Bump pre-release versions
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'true'
              run: |
                  if [ "${{ inputs.package }}" != "" ] && [ "${{ inputs.package }}" != "all" ]; then
                    SCOPE="--scope @vendure-community/${{ inputs.package }}"
                  else
                    SCOPE="--no-private"
                  fi
                  npx lerna exec $SCOPE -- \
                    'NEW=$(node -p "const v=require(\"./package.json\").version.replace(/-.*/,\"\").split(\".\");v[2]++;v.join(\".\")") && \
                     npm version "${NEW}-dev.${{ steps.date.outputs.date }}" --no-git-tag-version'

            - name: Commit version changes
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'true'
              run: |
                  git add .
                  git commit -m "chore: Bump version for nightly pre-release"

            # Publish to npm
            # Note: we do not use `lerna publish` because it fails with Trusted Publishing.
            # We use `lerna exec` with `npm publish` directly instead.
            - name: Publish to NPM (release)
              if: needs.setup.outputs.publish_type == 'release'
              run: |
                  ARGS="--access public --provenance"
                  if [ "${{ inputs.dry-run }}" = "true" ]; then
                    ARGS="$ARGS --dry-run"
                  fi
                  npx lerna exec --no-private -- npm publish $ARGS

            - name: Publish to NPM (nightly)
              if: needs.setup.outputs.publish_type == 'nightly' && steps.commit_check.outputs.should_publish == 'true'
              run: |
                  if [ "${{ inputs.package }}" != "" ] && [ "${{ inputs.package }}" != "all" ]; then
                    SCOPE="--scope @vendure-community/${{ inputs.package }}"
                  else
                    SCOPE="--no-private"
                  fi
                  ARGS="--access public --provenance --tag dev"
                  if [ "${{ inputs.dry-run }}" = "true" ]; then
                    ARGS="$ARGS --dry-run"
                  fi
                  npx lerna exec $SCOPE -- npm publish $ARGS
